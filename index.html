
<!DOCTYPE html>
<html>
<head>
    <title>TraderOS Lite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #22d3ee;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            margin: 15px 0;
            border-radius: 12px;
        }
        input, select, button {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            border-radius: 6px;
            border: none;
        }
        button {
            background: #22d3ee;
            font-weight: bold;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }
        .news-item {
            background: #0f172a;
            padding: 10px;
            border-left: 4px solid #22d3ee;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h1>TraderOS Lite</h1>

<div class="card">
    <h2>Add Trading Account</h2>
    <input type="text" id="accountName" placeholder="Account Name">
    <select id="accountType">
        <option value="Funded">Funded</option>
        <option value="Real">Real</option>
    </select>
    <input type="number" id="balance" placeholder="Current Balance">
    <button onclick="addAccount()">Add Account</button>
</div>

<div class="card">
    <h2>Accounts Overview</h2>
    <table id="accountTable">
        <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Balance</th>
        </tr>
    </table>
</div>

<div class="card">
    <h2>High Impact Market News</h2>
    <div id="newsContainer"></div>
</div>

<script>
let accounts = [];

function addAccount() {
    let name = document.getElementById("accountName").value;
    let type = document.getElementById("accountType").value;
    let balance = parseFloat(document.getElementById("balance").value);

    if(name && balance) {
        accounts.push({name, type, balance});
        updateTable();
    }
}

function updateTable() {
    let table = document.getElementById("accountTable");
    table.innerHTML = `
        <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Balance</th>
        </tr>
    `;

    accounts.forEach(acc => {
        table.innerHTML += `
            <tr>
                <td>${acc.name}</td>
                <td>${acc.type}</td>
                <td>$${acc.balance.toFixed(2)}</td>
            </tr>
        `;
    });
}

/* Demo News (Replace with API later) */
let news = [
    "USD High Impact CPI Data Release Today",
    "Federal Reserve Interest Rate Decision Coming",
    "Gold Surges on Inflation Fears",
    "Bitcoin Volatility Spike Expected"
];

function loadNews() {
    let container = document.getElementById("newsContainer");
    news.forEach(item => {
        container.innerHTML += `
            <div class="news-item">${item}</div>
        `;
    });
}

loadNews();
</script>

</body>
</html>
