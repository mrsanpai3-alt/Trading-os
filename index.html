<!DOCTYPE html>
<html>
<head>
    <title>TraderOS - Performance Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #38bdf8;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
        }
        input, button {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            border-radius: 5px;
            border: none;
        }
        button {
            background: #38bdf8;
            font-weight: bold;
            cursor: pointer;
        }
        table {
            width: 100%;
            margin-top: 10px;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }
    </style>
</head>
<body>

<h1>TraderOS</h1>

<div class="card">
    <h2>Add Trading Account</h2>
    <input type="text" id="accountName" placeholder="Account Name">
    <input type="number" id="balance" placeholder="Starting Balance">
    <button onclick="addAccount()">Add Account</button>
</div>

<div class="card">
    <h2>Add Trade</h2>
    <input type="text" id="tradeAccount" placeholder="Account Name">
    <input type="number" id="profit" placeholder="Profit / Loss">
    <button onclick="addTrade()">Add Trade</button>
</div>

<div class="card">
    <h2>Accounts Overview</h2>
    <table id="accountTable">
        <tr>
            <th>Account</th>
            <th>Balance</th>
        </tr>
    </table>
</div>

<script>
let accounts = {};

function addAccount() {
    let name = document.getElementById("accountName").value;
    let balance = parseFloat(document.getElementById("balance").value);

    if(name && balance) {
        accounts[name] = balance;
        updateTable();
    }
}

function addTrade() {
    let name = document.getElementById("tradeAccount").value;
    let profit = parseFloat(document.getElementById("profit").value);

    if(accounts[name] !== undefined) {
        accounts[name] += profit;
        updateTable();
    } else {
        alert("Account not found!");
    }
}

function updateTable() {
    let table = document.getElementById("accountTable");
    table.innerHTML = `
        <tr>
            <th>Account</th>
            <th>Balance</th>
        </tr>
    `;

    for(let name in accounts) {
        table.innerHTML += `
            <tr>
                <td>${name}</td>
                <td>$${accounts[name].toFixed(2)}</td>
            </tr>
        `;
    }
}
</script>

</body>
</html>
